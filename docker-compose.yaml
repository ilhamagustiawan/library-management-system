name: library-management-system

services:
  gateway:
    image: kong:3.9.3
    environment:
      KONG_ADMIN_LISTEN: "off"
      KONG_ANONYMOUS_REPORTS: "off"
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./infra/kong/kong.yaml:/kong/declarative/kong.yaml:ro
    ports:
      - 127.0.0.1:8000:8000
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - gateway

  auth-db:
    image: mysql:8.4.10
    environment:
      # Local development credentials. Do not reuse outside this stack.
      MYSQL_DATABASE: auth
      MYSQL_USER: auth
      MYSQL_PASSWORD: auth_password
      MYSQL_ROOT_PASSWORD: root_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - auth_mysql_data:/var/lib/mysql
    ports:
      - 127.0.0.1:3306:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - auth-db

networks:
  gateway:
  auth-db:

volumes:
  auth_mysql_data:
