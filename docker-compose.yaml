name: library-management-system

services:
  gateway:
    build:
      context: ./infra/kong
    image: library-management-kong:3.9.3
    environment:
      KONG_ADMIN_LISTEN: "off"
      KONG_ANONYMOUS_REPORTS: "off"
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yaml
      KONG_DNS_STALE_TTL: 0
      KONG_DNS_VALID_TTL: 1
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: bundled,lms-oauth2-introspection
      LMS_INTROSPECTION_CLIENT_SECRET: local-development-only-introspection-secret
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    volumes:
      - ./infra/kong/kong.yaml:/kong/declarative/kong.yaml:ro
    ports:
      - 127.0.0.1:8000:8000
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - gateway

  frontend:
    build:
      context: ./frontend
    image: library-management-frontend:local
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      SERVICE_ENV: development
      AUTH_ISSUER: http://localhost:8000
      INTERNAL_GATEWAY_URL: http://gateway:8000
      USER_SERVICE_URL: http://localhost:8000
      AUTH_CLIENT_ID: member-nextjs-web
      AUTH_CLIENT_SECRET: local-development-only-client-secret
      AUTH_REDIRECT_URI: http://localhost:3000/api/auth/callback/library
      AUTH_SCOPES: loans:borrow:self loans:return:self transactions:read:self books:read
      AUTH_SESSION_SECRET: local-development-only-session-secret
    ports:
      - 127.0.0.1:3000:3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000').then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - gateway

  auth-db:
    image: mysql:8.4.10
    environment:
      # Local development credentials. Do not reuse outside this stack.
      MYSQL_DATABASE: auth
      MYSQL_USER: auth
      MYSQL_PASSWORD: auth_password
      MYSQL_ROOT_PASSWORD: root_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - auth_mysql_data:/var/lib/mysql
    ports:
      - 127.0.0.1:3306:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - auth-db

  auth-service:
    build:
      context: ./backend/auth-service
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      SERVICE_ENV: development
      SERVICE_PORT: :8081
      ALLOWED_ORIGIN: http://localhost:3000
      DATABASE_DSN: auth:auth_password@tcp(auth-db:3306)/auth?parseTime=true&loc=UTC&charset=utf8mb4
      DATABASE_MIGRATION_URL: mysql://auth:auth_password@tcp(auth-db:3306)/auth
      OAUTH_ISSUER: http://localhost:8000
      OAUTH_JWT_SIGNING_KEY: local-development-only-jwt-signing-key
      LOGIN_URL: http://localhost:3000/login
      SESSION_COOKIE_SECURE: "false"
    command: ["/bin/sh", "-c", "/app/auth-service migrate --action up && exec /app/auth-service serve"]
    ports:
      - 127.0.0.1:8081:8081
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8081/health/readiness"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - gateway
      - auth-db

  user-db:
    image: mysql:8.4.10
    environment:
      # Local development credentials. Do not reuse outside this stack.
      MYSQL_DATABASE: users
      MYSQL_USER: users
      MYSQL_PASSWORD: users_password
      MYSQL_ROOT_PASSWORD: root_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - user_mysql_data:/var/lib/mysql
    ports:
      - 127.0.0.1:3307:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - user-db

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    environment:
      # Local development credentials. Do not reuse outside this stack.
      RABBITMQ_DEFAULT_USER: library
      RABBITMQ_DEFAULT_PASS: library_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - 127.0.0.1:5672:5672
      - 127.0.0.1:15672:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - events

  user-service:
    build:
      context: ./backend/user-service
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_ENV: development
      SERVICE_PORT: :8080
      ALLOWED_ORIGIN: http://localhost:3000
      DATABASE_DSN: users:users_password@tcp(user-db:3306)/users?parseTime=true&loc=UTC&charset=utf8mb4
      DATABASE_MIGRATION_URL: mysql://users:users_password@tcp(user-db:3306)/users
      AUTH_SERVICE_URL: http://auth-service:8081
      AUTH_CLIENT_ID: user-service
      AUTH_CLIENT_SECRET: local-development-only-user-service-secret
      AUTH_SCOPE: identities:create
      RABBITMQ_URL: amqp://library:library_password@rabbitmq:5672/
    command: ["/bin/sh", "-c", "/app/user-service migrate --action up && exec /app/user-service serve"]
    ports:
      - 127.0.0.1:8082:8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health/readiness"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - gateway
      - user-db
      - events

  book-db:
    image: mysql:8.4.10
    environment:
      # Local development credentials. Do not reuse outside this stack.
      MYSQL_DATABASE: book
      MYSQL_USER: book
      MYSQL_PASSWORD: book_password
      MYSQL_ROOT_PASSWORD: root_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - book_mysql_data:/var/lib/mysql
    ports:
      - 127.0.0.1:3308:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - book-db

  book-service:
    build:
      context: ./backend/book-service
    restart: unless-stopped
    depends_on:
      book-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_ENV: development
      SERVICE_PORT: :8080
      ALLOWED_ORIGIN: http://localhost:3000
      DATABASE_DSN: book:book_password@tcp(book-db:3306)/book?parseTime=true&loc=UTC&charset=utf8mb4
      DATABASE_MIGRATION_URL: mysql://book:book_password@tcp(book-db:3306)/book
      AUTH_INTROSPECTION_URL: http://auth-service:8081/oauth/introspect
      INTROSPECTION_CLIENT_ID: book-service
      INTROSPECTION_CLIENT_SECRET: local-development-only-book-introspection-secret
      AUTH_INTROSPECTION_TIMEOUT: 2s
      OAUTH_ISSUER: http://localhost:8000
      OAUTH_AUDIENCE: book-service
      TRANSACTION_SERVICE_CLIENT_ID: transaction-service
      RABBITMQ_URL: amqp://library:library_password@rabbitmq:5672/
    command: ["/bin/sh", "-c", "/app/book-service migrate --action up && exec /app/book-service serve"]
    ports:
      - 127.0.0.1:8083:8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health/readiness"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - gateway
      - book-db
      - events

  transaction-db:
    image: mysql:8.4.10
    environment:
      # Local development credentials. Do not reuse outside this stack.
      MYSQL_DATABASE: transactions
      MYSQL_USER: transactions
      MYSQL_PASSWORD: transactions_password
      MYSQL_ROOT_PASSWORD: root_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - transaction_mysql_data:/var/lib/mysql
    ports:
      - 127.0.0.1:3309:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - transaction-db

  transaction-service:
    build:
      context: ./backend/transaction-service
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      book-service:
        condition: service_started
      transaction-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_ENV: development
      SERVICE_PORT: :8080
      ALLOWED_ORIGIN: http://localhost:3000
      DATABASE_DSN: transactions:transactions_password@tcp(transaction-db:3306)/transactions?parseTime=true&loc=UTC&charset=utf8mb4
      DATABASE_MIGRATION_URL: mysql://transactions:transactions_password@tcp(transaction-db:3306)/transactions
      AUTH_TOKEN_URL: http://auth-service:8081/oauth/token
      BOOK_SERVICE_URL: http://book-service:8080
      BOOK_SERVICE_CLIENT_ID: transaction-service
      BOOK_SERVICE_CLIENT_SECRET: local-development-only-transaction-service-secret
      RABBITMQ_URL: amqp://library:library_password@rabbitmq:5672/
      LOAN_TERM: 168h
      FINE_DAILY_RATE_MINOR: "5000"
      STOCK_ACK_TIMEOUT: 5s
    command: ["/bin/sh", "-c", "/app/transaction-service migrate --action up && exec /app/transaction-service serve"]
    ports:
      - 127.0.0.1:8084:8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health/readiness"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - gateway
      - transaction-db
      - events

networks:
  gateway:
  auth-db:
  user-db:
  events:
  book-db:
  transaction-db:

volumes:
  auth_mysql_data:
  user_mysql_data:
  rabbitmq_data:
  book_mysql_data:
  transaction_mysql_data:
