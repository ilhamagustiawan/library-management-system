name: library-management-system

services:
  gateway:
    build:
      context: ./infra/kong
    image: library-management-kong:3.9.3
    environment:
      KONG_ADMIN_LISTEN: "off"
      KONG_ANONYMOUS_REPORTS: "off"
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: bundled,lms-oauth2-introspection
      LMS_INTROSPECTION_CLIENT_SECRET: ${OAUTH_INTROSPECTION_CLIENT_SECRET:?copy .env.example to .env}
    depends_on:
      auth-service:
        condition: service_started
    volumes:
      - ./infra/kong/kong.yaml:/kong/declarative/kong.yaml:ro
    ports:
      - 127.0.0.1:8000:8000
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      gateway:
        ipv4_address: 172.30.0.2

  auth-db:
    image: mysql:8.4.10
    environment:
      # Local development credentials. Do not reuse outside this stack.
      MYSQL_DATABASE: auth
      MYSQL_USER: auth
      MYSQL_PASSWORD: auth_password
      MYSQL_ROOT_PASSWORD: root_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - auth_mysql_data:/var/lib/mysql
    ports:
      - 127.0.0.1:3306:3306
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u root -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - auth-db

  auth-service:
    build:
      context: ./backend/auth-service
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      SERVICE_ENV: development
      SERVICE_PORT: :8081
      ALLOWED_ORIGIN: http://localhost:3000
      DATABASE_DSN: auth:auth_password@tcp(auth-db:3306)/auth?parseTime=true&loc=UTC&charset=utf8mb4
      DATABASE_MIGRATION_URL: mysql://auth:auth_password@tcp(auth-db:3306)/auth
      OAUTH_ISSUER: http://localhost:8081
      LOGIN_URL: http://localhost:3000/login
      SESSION_COOKIE_SECURE: "false"
      TRUSTED_PROXIES: 172.30.0.2
    command: ["/bin/sh", "-c", "/app/auth-service migrate --action up && exec /app/auth-service serve"]
    ports:
      - 127.0.0.1:8081:8081
    networks:
      - gateway
      - auth-db

networks:
  gateway:
    ipam:
      config:
        - subnet: 172.30.0.0/24
  auth-db:

volumes:
  auth_mysql_data:
